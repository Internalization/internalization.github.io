<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Background</title>
    <style>
        /* Make sure the body and html fill the whole viewport */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        
        /* Fullscreen video */
        #video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video covers the entire screen */
            z-index: -1; /* Sends the video behind other content */
        }
        
        /* Example content styling */
        .content {
            position: relative;
            color: white;
            text-align: center;
            padding: 20px;
            z-index: 1; /* Ensure content is above the video */
        }
    </style>
</head>
<body>
    <!-- Video element -->
    <video id="video-background" autoplay muted loop>
        <source src="videos/background.mov" type="video/quicktime">
        Your browser does not support the video tag.
    </video>
    
    <!-- Example content -->
    <div class="content">
        <h1>Welcome to My Website</h1>
        <p>This is a website with a video background.</p>
    </div>
</body>
</html>
