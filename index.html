<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internalization</title>
    <style>
        @font-face {
            font-family: 'Determination Mono';
            src: url('determination-mono.ttf') format('truetype'); /* Ensure this font file is in the root folder */
        }
        body {
            background-color: black;
            color: white;
            font-family: 'Determination Mono', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .settings-container {
            border: 2px solid white;
            padding: 20px;
            max-width: 300px;
            width: 100%;
            display: none; /* Initially hidden */
        }
        .title {
            margin-bottom: 30px;
            font-size: 24px;
            animation: bounce 2s infinite, gradient 5s linear infinite; /* Added gradient animation */
            background: linear-gradient(45deg, #00f, #009); /* Initial gradient colors */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .button {
            font-size: 18px;
            padding: 10px 20px;
            border: 2px solid white;
            cursor: pointer;
            background-color: black;
            color: white;
            transition: color 0.2s ease, background-color 0.2s ease;
        }
        .button:hover {
            color: yellow;
        }
        .enter-button {
            font-size: 24px;
            padding: 20px 40px;
            border: 2px solid white;
            cursor: pointer;
            background-color: black;
            color: white;
            transition: color 0.2s ease, background-color 0.2s ease;
        }
        .enter-button:hover {
            color: yellow;
        }
        .dropdown {
            display: none; /* Initially hidden */
            position: absolute;
            background-color: black;
            border: 2px solid white;
            padding: 10px;
            list-style: none;
            margin: 0;
            padding: 0;
            text-align: left;
            z-index: 1;
        }
        .dropdown a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 8px;
        }
        .dropdown a:hover {
            color: yellow;
        }
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }
        @keyframes gradient {
            0% {
                background: linear-gradient(45deg, #00f, #009);
            }
            50% {
                background: linear-gradient(45deg, #009, #00f);
            }
            100% {
                background: linear-gradient(45deg, #00f, #009);
            }
        }
    </style>
</head>
<body>
    <button class="enter-button" onclick="startMusic()">Enter</button>
    <div class="settings-container">
        <img src="image.png" alt="Susie" class="susie-image">
        <br>
        <br>
        <div id="title" class="title">Internalization</div>
        <div class="body">14 years old</div>
        <br>
        <br>
        <button class="button" onclick="toggleDropdown()">Files</button>
        <ul id="dropdownMenu" class="dropdown">
            <li><a href="files/placeholder.txt" download>∗ Arduino Project 1</a></li>
            <li><a href="files/placeholder.txt" download>∗ Arduino Project 2</a></li>
            <!-- Add more file links as needed -->
        </ul>
        <audio id="hoverSound" src="hover_sound.mp3"></audio>
        <audio id="backgroundMusic"></audio>
    </div>

    <script>
        // Audio context and analyser
        let audioContext;
        let analyser;
        let dataArray;

        function setupAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256; // Number of frequency bins
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            const audioElement = document.getElementById('backgroundMusic');
            const source = audioContext.createMediaElementSource(audioElement);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
        }

        // Function to start the background music and reveal the settings container
        function startMusic() {
            var songs = [
                'core.mp3',   
            ];

            var randomSong = songs[Math.floor(Math.random() * songs.length)];
            var backgroundMusic = document.getElementById('backgroundMusic');
            backgroundMusic.src = randomSong;

            setupAudio(); // Initialize audio context and analyser

            backgroundMusic.play();
            
            document.querySelector('.enter-button').style.display = 'none';
            document.querySelector('.settings-container').style.display = 'block';

            animateText(); // Start animating text
        }

        // Function to animate text size based on audio data
        function animateText() {
            requestAnimationFrame(animateText);
            analyser.getByteFrequencyData(dataArray);

            // Use average frequency data to set font size
            const average = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            const fontSize = Math.min(24 + average / 10, 72); // Min/max font size
            document.getElementById('title').style.fontSize = `${fontSize}px`;
        }

        // Function to toggle the dropdown menu
        function toggleDropdown() {
            var dropdown = document.getElementById('dropdownMenu');
            dropdown.style.display = (dropdown.style.display === 'none' || dropdown.style.display === '') ? 'block' : 'none';
        }

        // Function to play the hover sound
        function playSound() {
            document.getElementById('hoverSound').play();
        }

        // Add event listeners to play hover sound when hovering over dropdown items
        document.querySelectorAll('#dropdownMenu a').forEach(item => {
            item.addEventListener('mouseover', playSound);
        });
    </script>
</body>
</html>
