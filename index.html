<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Background</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        /* Make sure the body and html fill the whole viewport */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            position: relative; /* Ensure body is positioned relative for z-index */
        }
        
        /* Fullscreen video */
        #video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video covers the entire screen */
            z-index: 1; /* Places the video above everything else */
        }
    </style>
</head>
<body>
    <!-- Video element -->
    <video id="video-background" autoplay muted loop>
        <source src="videos/background.mov" type="video/quicktime">
        Your browser does not support the video tag.
    </video>
</body>
</html>
