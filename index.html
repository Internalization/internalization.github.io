<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internalization</title>
    <style>
        @font-face {
            font-family: 'Determination Mono';
            src: url('determination-mono.ttf') format('truetype'); /* Ensure this font file is in the root folder */
        }
        body {
            background-color: black;
            color: white;
            font-family: 'Determination Mono', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .settings-container {
            border: 2px solid white;
            padding: 20px;
            max-width: 300px;
            width: 100%;
            display: none; /* Initially hidden */
        }
        .title {
            margin-bottom: 30px;
            font-size: 24px;
            display: flex;
            justify-content: center;
        }
        .wave {
            display: inline-block;
            animation: wave-animation 1.5s infinite, rainbow-animation 2s infinite;
        }
        .wave:nth-child(1) { animation-delay: 0s; }
        .wave:nth-child(2) { animation-delay: 0.1s; }
        .wave:nth-child(3) { animation-delay: 0.2s; }
        .wave:nth-child(4) { animation-delay: 0.3s; }
        .wave:nth-child(5) { animation-delay: 0.4s; }
        .wave:nth-child(6) { animation-delay: 0.5s; }
        .wave:nth-child(7) { animation-delay: 0.6s; }
        .wave:nth-child(8) { animation-delay: 0.7s; }
        .wave:nth-child(9) { animation-delay: 0.8s; }
        .wave:nth-child(10) { animation-delay: 0.9s; }
        .wave:nth-child(11) { animation-delay: 1s; }
        .wave:nth-child(12) { animation-delay: 1.1s; }
        .wave:nth-child(13) { animation-delay: 1.2s; }
        
        @keyframes wave-animation {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes rainbow-animation {
            0% { color: red; }
            20% { color: orange; }
            40% { color: yellow; }
            60% { color: green; }
            80% { color: blue; }
            100% { color: purple; }
        }

        @keyframes enterPulse {
            0%, 100% {
                transform: scale(1) translateX(0);
            }
            50% {
                transform: scale(1.08) translateX(0px); /* Pulse and slight shift */
            }
        }

        .button {
            font-size: 18px;
            padding: 10px 20px;
            border: 2px solid white;
            cursor: pointer;
            background-color: black;
            color: white;
            transition: color 0.2s ease, background-color 0.2s ease;
        }
        .button:hover {
            color: yellow;
        }
        .enter-button {
            font-size: 24px;
            padding: 20px 40px;
            border: 2px solid white;
            cursor: pointer;
            background-color: black;
            color: white;
            transition: color 0.2s ease, background-color 0.2s ease;
            animation: enterPulse 1.5s infinite ease-in-out; /* Enter button animation */
        }
        .enter-button:hover {
            color: yellow;
        }
        .dropdown {
            display: none; /* Initially hidden */
            position: absolute;
            background-color: black;
            border: 2px solid white;
            padding: 10px;
            list-style: none;
            margin: 0;
            padding: 0;
            text-align: left;
            z-index: 1;
        }
        .dropdown a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 8px;
        }
        .dropdown a:hover {
            color: yellow;
        }
    </style>
</head>
<body>
    <button class="enter-button" onclick="startMusic()">Enter</button>
    <div class="settings-container">
        <img src="image.png" alt="Susie" class="susie-image">
        <br>
        <br>
        <div id="title" class="title">
            <span class="wave">I</span>
            <span class="wave">n</span>
            <span class="wave">t</span>
            <span class="wave">e</span>
            <span class="wave">r</span>
            <span class="wave">n</span>
            <span class="wave">a</span>
            <span class="wave">l</span>
            <span class="wave">i</span>
            <span class="wave">z</span>
            <span class="wave">a</span>
            <span class="wave">t</span>
            <span class="wave">i</span>
            <span class="wave">o</span>
            <span class="wave">n</span>
        </div>
        <br>
        <br>
        <button class="button" onclick="toggleDropdown()">Files</button>
        <ul id="dropdownMenu" class="dropdown">
            <li><a href="Files/placeholder.txt" download>∗ Arduino Project 1</a></li>
            <li><a href="Files/placeholder.txt" download>∗ Arduino Project 2</a></li>
            <!-- Add more file links as needed -->
        </ul>
        <audio id="hoverSound" src="hover_sound.mp3"></audio>
        <audio id="backgroundMusic"></audio>
    </div>

    <script>
        // Audio context and analyser
        let audioContext;
        let analyser;
        let dataArray;

        function setupAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256; // Number of frequency bins
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            const audioElement = document.getElementById('backgroundMusic');
            const source = audioContext.createMediaElementSource(audioElement);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
        }

        // Function to start the background music and reveal the settings container
        function startMusic() {
            var songs = [
                'core.mp3',   
            ];

            var randomSong = songs[Math.floor(Math.random() * songs.length)];
            var backgroundMusic = document.getElementById('backgroundMusic');
            backgroundMusic.src = randomSong;

            setupAudio(); // Initialize audio context and analyser

            backgroundMusic.play();
            
            document.querySelector('.enter-button').style.display = 'none';
            document.querySelector('.settings-container').style.display = 'block';

            animateText(); // Start animating text
        }

        // Function to animate text size based on audio data
        function animateText() {
            requestAnimationFrame(animateText);
            analyser.getByteFrequencyData(dataArray);

            // Use average frequency data to set font size
            const average = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            const fontSize = Math.min(15 + average / 10, 30); // Min/max font size
            document.getElementById('title').style.fontSize = `${fontSize}px`;
        }

        // Function to toggle the dropdown menu
        function toggleDropdown() {
            var dropdown = document.getElementById('dropdownMenu');
            dropdown.style.display = (dropdown.style.display === 'none' || dropdown.style.display === '') ? 'block' : 'none';
        }

        // Function to play the hover sound
        function playSound() {
            document.getElementById('hoverSound').play();
        }

        // Add event listeners to play hover sound when hovering over dropdown items
        document.querySelectorAll('#dropdownMenu a').forEach(item => {
            item.addEventListener('mouseover', playSound);
        });
    </script>
</body>
</html>
