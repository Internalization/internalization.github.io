<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Video</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        /* Ensure body and html cover the whole viewport */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: black; /* Fallback color */
            position: relative;
            padding: 0;
        }
        
        /* Fullscreen video */
        #video-background {
            position: fixed; /* Fixed positioning to cover the entire viewport */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video covers the entire screen */
            z-index: 0; /* Ensure the video is behind other content */
        }
    </style>
</head>
<body>
    <!-- Video element -->
    <video id="video-background" autoplay muted loop playsinline>
        <source src="background.mov" type="video/quicktime">
        Your browser does not support the video tag.
    </video>
</body>
</html>
